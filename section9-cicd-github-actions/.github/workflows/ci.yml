name: CI – Run Tests on Push

on:
  push:
    branches: ["**"]        # triggers on every branch push
  pull_request:
    branches: ["main", "feature/api"]

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('section9-cicd-github-actions/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r section9-cicd-github-actions/requirements.txt

      - name: Run tests with pytest
        run: pytest section9-cicd-github-actions/test_app.py -v --tb=short

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: section9-cicd-github-actions/
